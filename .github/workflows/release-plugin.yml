name: Release Product in Acquisitions OS plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate plugin manifest
        run: |
          MANIFEST="plugins/product-in-acquisitions-os/.claude-plugin/plugin.json"
          if [ ! -f "$MANIFEST" ]; then
            echo "ERROR: plugin.json not found at $MANIFEST"
            exit 1
          fi
          python3 -m json.tool "$MANIFEST" > /dev/null
          echo "plugin.json is valid JSON"

      - name: Extract plugin version
        id: version
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('plugins/product-in-acquisitions-os/.claude-plugin/plugin.json'))['version'])")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "manifest_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "Manifest version: $VERSION"
          echo "Tag version: $TAG_VERSION"
          if [ "$VERSION" != "$TAG_VERSION" ]; then
            echo "WARNING: tag ($TAG_VERSION) does not match manifest version ($VERSION)"
            echo "Continuing, but consider keeping them in sync."
          fi

      - name: Verify all skills have frontmatter
        run: |
          for skill_md in plugins/product-in-acquisitions-os/skills/*/SKILL.md; do
            if ! head -5 "$skill_md" | grep -q "^name:"; then
              echo "ERROR: missing 'name:' frontmatter in $skill_md"
              exit 1
            fi
            echo "OK: $skill_md"
          done

      - name: Check for em dashes (style rule)
        run: |
          if grep -r "—" plugins/product-in-acquisitions-os/ > /dev/null 2>&1; then
            echo "ERROR: found em dashes in plugin content (style rule violation)"
            grep -rn "—" plugins/product-in-acquisitions-os/ | head -10
            exit 1
          fi
          echo "PASS: no em dashes found"

      - name: Verify framework PDF exists
        run: |
          PDF="articles/The-90-Day-Product-Integration-Framework.pdf"
          if [ ! -f "$PDF" ]; then
            echo "ERROR: framework PDF not found at $PDF"
            echo "The release expects this file as a public lead-magnet asset."
            exit 1
          fi
          ls -la "$PDF"

      - name: Package plugin
        run: |
          cd plugins/product-in-acquisitions-os
          zip -r "/tmp/product-in-acquisitions-os.plugin" . -x "*.DS_Store"
          ls -la /tmp/product-in-acquisitions-os.plugin

      - name: Also create versioned filename
        run: |
          cp "/tmp/product-in-acquisitions-os.plugin" "/tmp/product-in-acquisitions-os-${GITHUB_REF_NAME}.plugin"
          ls -la /tmp/*.plugin

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "Product in Acquisitions OS ${{ github.ref_name }}"
          body: |
            **Product in Acquisitions OS** ${{ github.ref_name }}

            Claude plugin packaging the 90-Day Product Integration Framework as a working operating system for product leaders running post-acquisition integrations.

            ## Install

            Download `product-in-acquisitions-os.plugin` below, then in Claude Cowork or Claude Code:

            1. Open the plugin install panel
            2. Drop in the `.plugin` file
            3. Confirm install

            The four skills (Week 0 Readiness, Roadmap Convergence, Positioning Stability, People Integration) become available immediately.

            ## Marketplace install

            ```bash
            claude plugin install enalbenerraw/blanewarrene
            ```

            ## What's in this release

            See `plugins/product-in-acquisitions-os/README.md` for full details.

            ---

            *Built by Blane Warrene · blanewarrene.substack.com*
          files: |
            /tmp/product-in-acquisitions-os.plugin
            /tmp/product-in-acquisitions-os-${{ github.ref_name }}.plugin
            articles/The-90-Day-Product-Integration-Framework.pdf
          draft: false
          prerelease: false
